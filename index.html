<style>
/* Button panel */
#buttons{
  position:fixed;
  top:20px;
  right:20px;
  display:flex;
  flex-direction:column;
  gap:8px;
  z-index:10;
  animation: floatPanel 4s ease-in-out infinite alternate;
}

/* Float animation for entire panel */
@keyframes floatPanel {
  0% { transform: translateY(0px); }
  100% { transform: translateY(-8px); }
}

/* Buttons: smaller, dark coding green */
button{
  padding:8px 14px;            
  border:2px solid #0F9D58;    
  border-radius:6px;
  background:transparent;       
  color:#0F9D58;               
  font-size:14px;              
  font-weight:600;             
  cursor:pointer;
  transition:0.3s all;
}

/* Hover effect: rise + glow */
button:hover{
  transform: translateY(-4px);
  background:rgba(15,157,88,0.1);
  box-shadow: 0 0 8px rgba(15,157,88,0.6);
}
</style>
